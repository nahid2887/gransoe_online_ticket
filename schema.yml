openapi: 3.0.3
info:
  title: Customer API
  version: 1.0.0
  description: Customer Registration and Management API
paths:
  /api/customers/:
    get:
      operationId: customers_list
      description: |-
        ViewSet for retrieving customer details.
        Requires JWT authentication.
      tags:
      - customers
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerDetail'
          description: ''
  /api/customers/{user__id}/:
    get:
      operationId: customers_retrieve
      description: |-
        ViewSet for retrieving customer details.
        Requires JWT authentication.
      parameters:
      - in: path
        name: user__id
        schema:
          type: integer
        description: A unique integer value identifying this customer.
        required: true
      tags:
      - customers
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDetail'
          description: ''
  /api/events/upcoming/:
    get:
      operationId: events_upcoming_list
      description: Return all upcoming events that anyone can view.
      tags:
      - events
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UpcomingEvent'
          description: ''
  /api/events/upcoming/{id}/:
    get:
      operationId: events_upcoming_retrieve
      description: Return a single upcoming event by ID.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - events
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpcomingEvent'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpcomingEventDetailNotFoundResponse'
          description: ''
  /api/login/:
    post:
      operationId: login_create
      description: Login with email and password. Returns customer details, access
        token, and refresh token in cookie.
      tags:
      - login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerLogin'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomerLogin'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomerLogin'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
          description: ''
  /api/logout/:
    post:
      operationId: logout_create
      description: Logout user. Can blacklist a specific refresh token or all outstanding
        tokens for the user.
      tags:
      - logout
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Logout'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Logout'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Logout'
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccessResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutErrorResponse'
          description: ''
  /api/my-tickets/:
    get:
      operationId: my_tickets_retrieve
      tags:
      - my-tickets
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
          description: ''
  /api/my-tickets/{id}/:
    get:
      operationId: my_tickets_retrieve_2
      description: Return a single ticket owned by the authenticated customer.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - my-tickets
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyTicketNotFoundResponse'
          description: ''
  /api/purchase/:
    post:
      operationId: purchase_create
      description: Purchase tickets for an event. If Stripe is configured, returns
        PaymentIntent client_secret; otherwise completes immediately.
      tags:
      - purchase
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Purchase'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Purchase'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Purchase'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
          description: ''
  /api/register/:
    post:
      operationId: register_create
      description: Register a new customer account with required details.
      tags:
      - register
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerRegistration'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomerRegistration'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomerRegistration'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
          description: ''
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
          - cy
          - da
          - de
          - dsb
          - el
          - en
          - en-au
          - en-gb
          - eo
          - es
          - es-ar
          - es-co
          - es-mx
          - es-ni
          - es-ve
          - et
          - eu
          - fa
          - fi
          - fr
          - fy
          - ga
          - gd
          - gl
          - he
          - hi
          - hr
          - hsb
          - ht
          - hu
          - hy
          - ia
          - id
          - ig
          - io
          - is
          - it
          - ja
          - ka
          - kab
          - kk
          - km
          - kn
          - ko
          - ky
          - lb
          - lt
          - lv
          - mk
          - ml
          - mn
          - mr
          - ms
          - my
          - nb
          - ne
          - nl
          - nn
          - os
          - pa
          - pl
          - pt
          - pt-br
          - ro
          - ru
          - sk
          - sl
          - sq
          - sr
          - sr-latn
          - sv
          - sw
          - ta
          - te
          - tg
          - th
          - tk
          - tr
          - tt
          - udm
          - ug
          - uk
          - ur
          - uz
          - vi
          - zh-hans
          - zh-hant
      tags:
      - schema
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/staff/events/:
    get:
      operationId: staff_events_list
      description: List all events
      tags:
      - Staff Events
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
          description: ''
    post:
      operationId: staff_events_create
      description: Create a new event (superuser only)
      tags:
      - Staff Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Event'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Event'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
  /api/staff/events/{id}/:
    get:
      operationId: staff_events_retrieve
      description: Retrieve a single event by ID
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this event.
        required: true
      tags:
      - Staff Events
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
    put:
      operationId: staff_events_update
      description: Update an event (superuser only)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this event.
        required: true
      tags:
      - Staff Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Event'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Event'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
    patch:
      operationId: staff_events_partial_update
      description: Partially update an event (superuser only)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this event.
        required: true
      tags:
      - Staff Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEvent'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEvent'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEvent'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
    delete:
      operationId: staff_events_destroy
      description: Delete an event (superuser only)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this event.
        required: true
      tags:
      - Staff Events
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/staff/login/:
    post:
      operationId: staff_login_create
      description: Staff login. Returns staff details and tokens.
      tags:
      - staff
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffLogin'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StaffLogin'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StaffLogin'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffAuthResponse'
          description: ''
  /api/staff/me/:
    get:
      operationId: staff_me_retrieve
      description: Get the authenticated user own profile details. Supports customer,
        staff, and superuser accounts.
      tags:
      - Staff Profile
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnProfileResponse'
          description: ''
  /api/staff/register/:
    post:
      operationId: staff_register_create
      description: Register a new staff member with required details.
      tags:
      - staff
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffRegistration'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StaffRegistration'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StaffRegistration'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffAuthResponse'
          description: ''
  /api/staff/staffs/:
    get:
      operationId: staff_staffs_list
      description: List all staff members (superuser only).
      tags:
      - Staff Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StaffDetail'
          description: ''
  /api/staff/staffs/{id}/:
    get:
      operationId: staff_staffs_retrieve
      description: Retrieve a single staff member by ID (superuser only).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this staff.
        required: true
      tags:
      - Staff Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffDetail'
          description: ''
    put:
      operationId: staff_staffs_update
      description: Update a staff member details including role (superuser only).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this staff.
        required: true
      tags:
      - Staff Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StaffDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StaffDetail'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffUpdateResponse'
          description: ''
    patch:
      operationId: staff_staffs_partial_update
      description: Partially update a staff member details including role (superuser
        only).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this staff.
        required: true
      tags:
      - Staff Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedStaffDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedStaffDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedStaffDetail'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffUpdateResponse'
          description: ''
    delete:
      operationId: staff_staffs_destroy
      description: Delete a staff member profile and their associated User account
        (superuser only).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this staff.
        required: true
      tags:
      - Staff Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffDeleteResponse'
          description: ''
  /api/staff/super/change-password/:
    post:
      operationId: staff_super_change_password_create
      description: Change the logged-in superuser password.
      tags:
      - staff
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuperuserPasswordChange'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SuperuserPasswordChange'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SuperuserPasswordChange'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuperuserPasswordChangeResponse'
          description: ''
  /api/staff/super/dashboard/:
    get:
      operationId: staff_super_dashboard_retrieve
      description: Get the super admin dashboard summary, monthly revenue, and recent
        completed orders.
      tags:
      - Staff Dashboard
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuperuserDashboardResponse'
          description: ''
  /api/staff/super/login/:
    post:
      operationId: staff_super_login_create
      description: Superuser login using email and password. Returns user details
        and tokens.
      tags:
      - staff
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuperuserLogin'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SuperuserLogin'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SuperuserLogin'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuperuserAuthResponse'
          description: ''
  /api/staff/super/profile/:
    get:
      operationId: staff_super_profile_retrieve
      description: Get the logged-in superuser profile.
      tags:
      - staff
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuperuserDetail'
          description: ''
    put:
      operationId: staff_super_profile_update
      description: Update the logged-in superuser profile information.
      tags:
      - staff
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuperuserProfile'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SuperuserProfile'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SuperuserProfile'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuperuserProfileResponse'
          description: ''
    patch:
      operationId: staff_super_profile_partial_update
      description: Get the logged-in superuser profile.
      tags:
      - staff
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedSuperuserDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedSuperuserDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedSuperuserDetail'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuperuserDetail'
          description: ''
  /api/staff/upcoming-events/:
    get:
      operationId: staff_upcoming_events_list
      description: List upcoming events for staff users.
      tags:
      - Staff Upcoming Events
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
          description: ''
  /api/staff/upcoming-events/{id}/:
    get:
      operationId: staff_upcoming_events_retrieve
      description: Retrieve a single upcoming event by ID for staff users.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this event.
        required: true
      tags:
      - Staff Upcoming Events
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
  /api/staff/verify-ticket/:
    post:
      operationId: staff_verify_ticket_create
      description: Verify a ticket for a given event by `tracking_number` or `qr_data`.
        Marks ticket as verified once.
      tags:
      - Staff Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffTicketVerify'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StaffTicketVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StaffTicketVerify'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
          description: ''
  /api/token/refresh/:
    post:
      operationId: token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/webhook/stripe:
    post:
      operationId: webhook_stripe_create
      description: Stripe webhook endpoint (optional) to finalize orders on payment
        success.
      tags:
      - webhook
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/webhook/stripe/:
    post:
      operationId: webhook_stripe_create_2
      description: Stripe webhook endpoint (optional) to finalize orders on payment
        success.
      tags:
      - webhook
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
components:
  schemas:
    AuthResponse:
      type: object
      description: Response serializer for authentication endpoints
      properties:
        customer:
          $ref: '#/components/schemas/CustomerDetail'
        access_token:
          type: string
        refresh_token:
          type: string
        message:
          type: string
      required:
      - access_token
      - customer
      - message
      - refresh_token
    CustomerDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        full_name:
          type: string
          maxLength: 255
        email:
          type: string
          readOnly: true
        username:
          type: string
          readOnly: true
        phone_number:
          type: string
          maxLength: 20
        gender:
          $ref: '#/components/schemas/GenderEnum'
        date_of_birth:
          type: string
          format: date
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - date_of_birth
      - email
      - full_name
      - gender
      - id
      - phone_number
      - username
    CustomerLogin:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email address
