openapi: 3.0.3
info:
  title: Customer API
  version: 1.0.0
  description: Customer Registration and Management API
paths:
  /api/contact-us/:
    post:
      operationId: contact_us_create
      description: Send a contact message to the application support email.
      parameters:
      - in: header
        name: Accept-Language
        schema:
          type: string
        description: Language code to get translated content (e.g., 'da' for Danish,
          'en' for English).
      tags:
      - Contact Us
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactUs'
            examples:
              ContactRequest:
                value:
                  name: Nahid Hasan
                  email: nahid@example.com
                  subject: Need Support
                  message: I am facing a login issue.
                summary: Contact Request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ContactUs'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ContactUs'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
          description: ''
  /api/customers/:
    get:
      operationId: customers_list
      description: |-
        ViewSet for retrieving customer details.
        Requires JWT authentication.
      parameters:
      - in: header
        name: Accept-Language
        schema:
          type: string
        description: Language code to get translated content (e.g., 'da' for Danish,
          'en' for English).
      tags:
      - customers
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerDetail'
          description: ''
  /api/customers/{user__id}/:
    get:
      operationId: customers_retrieve
      description: |-
        ViewSet for retrieving customer details.
        Requires JWT authentication.
      parameters:
      - in: header
        name: Accept-Language
        schema:
          type: string
        description: Language code to get translated content (e.g., 'da' for Danish,
          'en' for English).
      - in: path
        name: user__id
        schema:
          type: integer
        description: A unique integer value identifying this customer.
        required: true
      tags:
      - customers
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDetail'
          description: ''
  /api/events/upcoming/:
    get:
      operationId: events_upcoming_list
      description: Return upcoming events with optional filters.
      parameters:
      - in: header
        name: Accept-Language
        schema:
          type: string
        description: Language code to get translated content (e.g., 'da' for Danish,
          'en' for English).
      - in: query
        name: date
        schema:
          type: string
        description: Filter by date (YYYY-MM-DD)
      - in: query
        name: search
        schema:
          type: string
        description: Search by title or venue
      - in: query
        name: venue
        schema:
          type: string
        description: Filter by venue
      tags:
      - events
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UpcomingEvent'
          description: ''
  /api/events/upcoming/{id}/:
    get:
      operationId: events_upcoming_retrieve
      parameters:
      - in: header
        name: Accept-Language
        schema:
          type: string
        description: Language code to get translated content (e.g., 'da' for Danish,
