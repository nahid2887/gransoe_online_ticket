components:
  schemas:
    AboutUs:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        content:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - content
      - created_at
      - id
    AuthResponse:
      type: object
      description: Response serializer for authentication endpoints
      properties:
        customer:
          $ref: '#/components/schemas/CustomerDetail'
        access_token:
          type: string
        refresh_token:
          type: string
        message:
          type: string
      required:
      - access_token
      - customer
      - message
      - refresh_token
    Banner:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        image:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - image
      - title
    ContactUs:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        subject:
          type: string
          maxLength: 255
        message:
          type: string
      required:
      - email
      - message
      - name
      - subject
    CustomerDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        full_name:
          type: string
          maxLength: 255
        email:
          type: string
          readOnly: true
        username:
          type: string
          readOnly: true
        phone_number:
          type: string
          maxLength: 20
        gender:
          $ref: '#/components/schemas/GenderEnum'
        date_of_birth:
          type: string
          format: date
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - date_of_birth
      - email
      - full_name
      - gender
      - id
      - phone_number
      - username
    CustomerLogin:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email address
        password:
          type: string
          writeOnly: true
          description: Password
      required:
      - email
      - password
    CustomerRegistration:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email address for login
        password:
          type: string
          writeOnly: true
          description: Password minimum 8 characters
          minLength: 8
        confirm_password:
          type: string
          writeOnly: true
          description: Confirm password
          minLength: 8
        full_name:
          type: string
          description: Customer full name
          maxLength: 255
        phone_number:
          type: string
          description: Phone number
          maxLength: 20
        gender:
          allOf:
          - $ref: '#/components/schemas/GenderEnum'
          description: |-
            Gender (M/F/O)

            * `M` - Male
            * `F` - Female
            * `O` - Other
        date_of_birth:
          type: string
          format: date
          description: Date of birth (YYYY-MM-DD)
      required:
      - confirm_password
      - date_of_birth
      - email
      - full_name
      - gender
      - password
      - phone_number
    DashboardMonthlyRevenueItem:
      type: object
      properties:
        month:
          type: string
        revenue:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
      required:
      - month
      - revenue
    DashboardRecentOrder:
      type: object
      properties:
        order_id:
          type: string
        event:
          type: string
        event_image:
          type: string
        customer:
          type: string
        quantity:
          type: integer
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        payment_status:
          type: string
        created_at:
          type: string
          format: date-time
      required:
      - amount
      - created_at
      - customer
      - event
      - event_image
      - order_id
      - payment_status
      - quantity
    DashboardSummary:
      type: object
      properties:
        total_revenue:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        tickets_sold:
          type: integer
        active_events:
          type: integer
        checked_in:
          type: integer
      required:
      - active_events
      - checked_in
      - tickets_sold
      - total_revenue
    Event:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        venue:
          type: string
          maxLength: 255
        age:
          type: string
          maxLength: 50
        image:
          type: string
          format: uri
        date:
          type: string
          format: date
          nullable: true
        time:
          type: string
          format: time
          nullable: true
